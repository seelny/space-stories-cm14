- type: constructionGraph
  parent: RMC
  id: TelecomTowerGraph
  start: start
  graph:
  - node: start
    edges:
    - to: nodeTelecomTowerBroken
      completed:
      - !type:SnapToGrid
        southRotation: true
      steps:
      - material: CMSteel
        amount: 2
        doAfter: 1

  - node: nodeTelecomTowerBroken
    entity: CMTelecomTowerBroken
    edges:
    - to: nodeTelecomTowerRepair
      completed:
      - !type:SnapToGrid
      steps:
      - tool: Welding
        doAfter: 15

  - node: nodeTelecomTowerRepair
    entity: CMTelecomTower
    edges:
    - to: nodeTelecomTowerBroken
      steps:
      - tool: Prying
        doAfter: 30
