- type: entity
  parent: BaseStorageItem
  id: CMEssentialSmartGunOperatorSet
  name: M56 smartgun system case
  description: "A large case containing an M56B Smartgun, M56 combat harness, head mounted sight and powerpack.\n\nNOTE: You cannot put items back inside this case."
  components:
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/loadout_kits.rsi
    layers:
    - state: closed
      map: [ base ]
    - state: demo
      map: [ demo ]
  - type: Icon
    sprite: _RMC14/Objects/loadout_kits.rsi
    state: closed
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: open }
          False: { state: closed }
        demo:
          True: { visible: false }
          False: { visible: true }
  - type: Item
    size: Huge
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,11,1
  - type: StorageFill
    contents:
    - id: CMGlassesM56
    - id: CMWeaponSmartGun
    # - id: smartgun DV9 battery
    - id: CMArmorM56CombatHarness
    - id: CMM56SmartGunDrum
    - id: CMM56SmartGunDrum
  - type: CMChangeUserOnVend
    addComponents:
    - type: SmartGunWhitelist
  - type: RemoveOnlyStorage
  - type: FixedItemSizeStorage
