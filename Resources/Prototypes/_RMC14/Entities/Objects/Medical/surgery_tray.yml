- type: entity
  id: CMSurgeryTray
  parent: BoxBase
  name: surgical tray
  description: A small metallic tray covered in sterile tarp. Intended to store surgical tools in a neat and clean fashion.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/surgery_tray.rsi
    layers:
    - state: empty
    - state: full
      map: ["full"]
      visible: false
  - type: Item
    sprite: _RMC14/Objects/Medical/Surgery/surgery_tray.rsi
    size: Large
    shape: null
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,20,1
    whitelist:
      tags:
      - SurgeryTool
      - CMSurgicalLine
      - CMSynthGraft
      - CMTraumaKit
  - type: ItemMapper
    mapLayers:
      full:
        whitelist:
          tags:
          - SurgeryTool
          - CMSurgicalLine
          - CMSynthGraft
          - CMTraumaKit
  - type: Appearance
