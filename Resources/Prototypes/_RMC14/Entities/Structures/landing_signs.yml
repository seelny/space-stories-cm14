- type: entity
  abstract: true
  parent: BaseSign
  id: CMLandingSignsBase
  components:
  - type: Sprite
    sprite: _RMC14/Structures/landing_signs.rsi
    drawdepth: Overdoors
    offset: 0,0.8
  - type: SpriteFade
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/_RMC14/Structures/metalhit.ogg"
  - type: Physics
    bodyType: Static
    canCollide: true
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.75,-0.25,0.75,0.25"
        mask:
        - FullTileMask
        layer:
        - WallLayer
        density: 1000
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Appearance

- type: entity
  parent: CMLandingSignsBase
  id: CMLandingSignsLazarus
  name: lazarus sign
  description: Semiotic Standard denoting the nearby presence of an airlock.
  components:
  - type: Sprite
    state: laz_sign

- type: entity
  parent: CMLandingSignsBase
  id: CMLandingSignsSolarisRidge
  name: solaris ridge sign
  description: Semiotic Standard denoting the nearby presence of an airlock.
  components:
  - type: Sprite
    state: red_sign
