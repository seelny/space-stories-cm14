- type: entity
  parent: TelecomServer
  id: CMTelecomServer
  name: telecommunication server
  description: When powered and filled with encryption keys it allows radio headset communication.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/telecomms.rsi
    snapCardinals: true
    layers:
    - state: comm_server_off
    - state: comm_server
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: comm_server_o
      map: ["enum.WiresVisualLayers.MaintenancePanel"]

- type: entity
  parent: CMTelecomServer
  id: CMTelecomServerFilled
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyMasterShip
      - CMEncryptionKeyMasterSquad

- type: entity
  parent: BaseStructure
  id: CMTelecomTowerBroken
  name: telecommunication tower
  description: When powered it allows radio headset communication.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/comm_tower.rsi
    offset: -0.5,1
    layers:
    - state: broken
  - type: Construction
    graph: TelecomTowerGraph
    node: nodeTelecomTowerBroken
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.5,-0.5,0.5,0.5"
        density: 190
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic

- type: entity
  parent: CMTelecomTowerBroken
  id: CMTelecomTower
  name: telecommunication tower
  description: When powered it allows radio headset communication.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/comm_tower.rsi
    layers:
    - state: off
    - state: default
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: true }
          False: { visible: false }
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: nodeTelecomTowerBroken
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: EncryptionKeyHolder
    keySlots: 10
    keysUnlocked: false
  - type: TelecomServer
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: Construction
    graph: TelecomTowerGraph
    node: nodeTelecomTowerRepair
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyMasterShip
      - CMEncryptionKeyMasterSquad
  - type: ApcPowerReceiver
    powerLoad: 1000
  - type: ExtensionCableReceiver
