# MEDICAL

- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewMedicalEquipment
  name: ColMarTech medical equipment rack
  description: An automated equipment vendor for the Medical Department.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessMedical" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/medical_equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMNurse
    - CMDoctor
    - CMResearcher
    - CMCMO
    sections:
    - name: Медицинский Набор (Обязательный)
      jobs:
      - CMDoctor
      - CMResearcher
      - CMCMO
      takeAll: CMMedicalSet
      entries:
      - id: RMCVendorBundleCrewMedicalEssentialsDoctor
    - name: Медицинский Набор (Обязательный)
      jobs:
      - CMNurse
      takeAll: CMMedicalSet
      entries:
      - id: CMVendorBundleCrewMedicalEssentialsNurse
    - name: Стандартное Оборудование
      takeAll: CMStandard
      entries:
      - id: CMHandsLatex
      - id: CMHeadsetMedical
    - name: Очки
      choices: { CMEyewear: 1 }
      entries:
      - id: RMCGlassesMedicalHUDGlasses
#      - id: Prescription Medical HUD Glasses
    - name: Униформа
      choices: { CMUniform: 1 }
      entries:
      - id: CMScrubsGreen
      - id: CMScrubsBlue
      - id: RMCScrubsLightBlue
      - id: CMScrubsPurple
      - id: RMCScrubsOlive
      - id: RMCScrubsGrey
    - name: Костюм
      jobs:
      - CMNurse
      choices: { CMSuit: 1 }
      entries:
      - id: RMCMedicalApron
    - name: Костюм
      jobs:
      - CMDoctor
      choices: { CMSuit: 1 }
      entries:
      - id: RMCLabcoat
      - id: RMCMedicalApron
#    - name: Snow gear (Snow use only)
#      takeall: CMSnowgear
#      entries:
#      - id: Snowcoat
#      - id: Balaclava
#      - id: Snow Scarf
    - name: Головные Уборы
      choices: { CMHeadwear: 1 }
      entries:
      - id: CMHeadCapSurgOrange
      - id: CMHeadCapSurgBlue
      - id: CMHeadCapSurgPurple
      - id: CMHeadCapSurgGreen
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: CMBeltMedicBagFilled
        name: пояс M276 медицинский (полный)
      - id: CMBeltMedicalFilled
        name: пояс M276 медицинский (полный)
    - name: Рюкзак
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarine
        name: Рюкзак
      - id: CMSatchelMarine
        name: сумка
      - id: CMBackpackMedical
      - id: CMSatchelMedical
    - name: Подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchAutoinjector
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (многоразовые инъекторы)
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (марля, мазь) # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
      - id: RMCPouchFirstResponder
      - id: RMCPouchMedical
      - id: RMCPouchMedkit
        recommended: true
      - id: RMCPouchReagentCanisterBicaridine
        recommended: true
        name: канистра реагентов (бикаридин)
      - id: RMCPouchReagentCanisterKelotane
        recommended: true
        name: канистра реагентов (келотан)
      - id: RMCPouchReagentCanisterTricordrazineRevival
        recommended: true
        name: канистра реагентов (возрождающая смесь - трикордразин)
      #      - id: CMPressurizedReagentCanisterPouchPeridaxonRevivalMix
      #        recommended: true
      #        name: канистра реагентов (возрождающая смесь - перидаксон)
      - id: RMCPouchReagentCanisterTricordrazine
        recommended: true
        name: канистра реагентов (трикордразин)
      - id: RMCPouchReagentCanister
        recommended: true
        name: канистра реагентов (пустая)
      #- id: CMSlingPouch
    - name: Аксессуары
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
      - id: CMWebbingBlack
      - id: RMCWebbingLegPouch
      - id: RMCWebbingLegPouchBlack
      - id: CMWebbing
      - id: RMCWebbingBlackSmall
      - id: RMCWebbingDropPouch
      - id: RMCWebbingDropPouchBlack
