# Staff Officer #

# Equipment Vend
- type: entity
  parent: ColMarTechBase
  id: ColMarTechStaffOfficerEquipment
  name: ColMarTech Staff Officer Equipment Rack
  description: An automated equipment vendor for Staff Officers
  components:
  - type: AccessReader
    access:
    - [ "CMAccessCommand" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMStaffOfficer
    sections:
    - name: Стандартное Оборудование
      takeAll: CMStandard
      entries:
      - id: CMBootsBlackFilled
      - id: RMCHeadsetMarineCommand
      - id: CMMRE
    - name: Стандартное Оборудование
      takeAll: CMUniform
      entries:
      - id: CMJumpsuitBO
        name: служебная форма
      - id: CMJumpsuitOperations
        name: оперативная форма
        recommended: true
      - id: CMHandsBlackMarine
    - name: Куртка
      choices: { CMCoat: 1}
      entries:
      - id: RMCCoatService
        recommended: true
    - name: Шляпа
      choices: { CMHat: 1 }
      entries:
      - id: RMCHeadBeret
        recommended: true
      - id: RMCHeadCapFlippable
        recommended: true
      - id: CMHeadCapOfficer
        recommended: true
      - id: CMHeadCapPeakedService
        recommended: true
    - name: Личное Оружие
      choices: { CMWeapon: 1 }
      entries:
      - id: RMCMK80BeltFilled
        name: пистолет VP78
        recommended: true
      - id: RMCM1984BeltFilled
        name: пистолет M4A3
        recommended: true
      - id: CMM77BeltFilled
        name: пистолет 88 M4
        recommended: true
      - id: RMCM44BeltFilled
        name: револьвер M44
        recommended: true
    - name: Рюкзак
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpack
      - id: CMSatchel
    - name: Прочие Принадлежности
      entries:
      - id: RMCBinoculars
        points: 5
      - id: RMCRangefinder
        points: 8
      - id: RMCLaserDesignator
        points: 12
        recommended: true
      - id: RMCFlashlight
        points: 1
        recommended: true
      - id: RMCMotionDetector
        points: 5
        recommended: true
      - id: SprayBottleSpaceCleaner
        points: 2
      - id: RMCWhistle
        points: 5

