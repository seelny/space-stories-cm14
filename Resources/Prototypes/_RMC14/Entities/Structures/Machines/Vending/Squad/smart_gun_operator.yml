- type: entity
  parent: ColMarTechBase
  id: ColMarTechSGEquipment
  name: ColMarTech squad Smart Gun equipment rack
  description: An automated rack hooked up to a colossal storage of Squad Smart Gun standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessSmartPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSmartGunOperator
    sections:
    - name: Стандартное оборудование
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleRiflemanApparel
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
     #- id: CMM802SmartGunOperatorSidearmBeltFilled
      - id: CMBeltSmartGunOperatorFilled
    - name: подсумок
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchFlareFilled
        name: подсумок фаеров (полный)
#      - id: RMCPouchElectronics # TODO RMC14
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (многоразовые инъекторы)
        recommended: true
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (марля, мазь) # TODO RMC14 splints comma
        recommended: true
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
        recommended: true
      - id: RMCPouchMagazinePistolLarge
        recommended: true
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchGeneralMedium
      - id: RMCPouchPistol
      - id: RMCPouchMacheteFilled
    #- id: CMSlingPouch
    - name: Accessories
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
    #- id: CMShoulderHolster
      - id: CMWebbing
    #- id: CMDropPouch
    - name: Маски
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskGas
      - id: CMMaskCoif
