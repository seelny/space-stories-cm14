    - name: Боеприпасы вторичного оружияs
      entries:
      - id: CMMagazinePistolMK80
        points: 5
      - id: RMCMagazinePistolSU6
        points: 10
    - name: Restricted Firearms
      entries:
      - id: RMCMK80Case
        points: 15
      - id: RMCSmartPistolCase
        points: 15
    - name: Предметы одежды
      entries:
    #- id: CMScabbardMacheteFull
    #  points: 6
