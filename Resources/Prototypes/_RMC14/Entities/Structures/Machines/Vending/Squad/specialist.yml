# SPECIALIST

- type: entity
  parent: ColMarTechBase
  id: ColMarTechSWSGear
  name: ColMarTech squad weapons specialist gear rack
  description: An automated gear rack for Squad Weapons Specialists.
  components:
  - type: RMCVendorSpecialist
  - type: AccessReader
    access:
    - [ "CMAccessSpecPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/specialist_gear.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMWeaponsSpecialist
    pointsType: Specialist
    sections:
    - name: Наборы Специалиста По Оружию
      takeOne: SquadSpecKit
      sharedSpecLimit: 1 # Stories-Balance
      entries:
      - id: RMCDemoSpecEquipmentCase
      - id: RMCGrenadeSpecEquipmentCase
      #  points: 0
      #- id: PyroSet
      #  points: 0
      - id: RMCScoutSpecEquipmentCase
      - id: CMSniperEquipmentCase
      - id: STSniperAntiMaterielEquipmentCase # Stories-AntiMateriel
    - name: Дополнительные Боеприпасы Для Скаутов
      entries:
      - id: RMCMagazineRifleM4SPRA19Impact
        points: 40
      - id: RMCMagazineRifleM4SPRA19Incendiary
        points: 40
      - id: RMCMagazineRifleM4SPRA19
        points: 40
    - name: Дополнительные Снайперские Патроны
      entries:
      - id: CMMagazineSniperM96SFlak
        points: 40
      - id: CMMagazineSniperM96SIncendiary
        points: 40
      - id: CMMagazineSniperM96S
        points: 40
      - id: STMagazineSniperXM43E1AntiMateriel # Stories-AntiMateriel
        points: 40
    - name: Дополнительные Боеприпасы Для Разрушителей
      entries:
      - id: RMCRocket84mmAntiArmor
        points: 40
      - id: RMCRocket84mm
        points: 40
    #- id: 84mmWhitePhosphorusRocket
    #  points: 40
    - name: Дополнительные Гранаты
      entries:
      - id: CMGrenadeHighExplosive
        name: Взрывные Гранаты M40 HEDP (x6)
        points: 40
        spawn: 6
      - id: CMGrenadeFrag # TODO RMC14 hefa and smoke temporarily until normal options are coded
        name: Осколочные Гранаты M40 HEFA (x6)
        points: 40
        spawn: 6
      - id: CMGrenadeSmoke
        name: Дымовые Гранаты M40 HSDP (x6)
        points: 20
        spawn: 6
      - id: RMCGrenadeIncendiary
        name: Зажигательные Гранаты M40 HIDP (x6)
        points: 40
        spawn: 6
