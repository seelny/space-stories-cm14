- type: entity
  parent: ColMarTechBase
  id: ColMarTechMedicalEquipment
  name: ColMarTech squad medical equipment rack
  description: An automated rack hooked up to a colossal storage of hospital corpsman standard-issue equipment.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessMedPrep" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/clothing.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMHospitalCorpsman
    sections:
    - name: Стандартное Оборудование
      takeAll: CMStandard
      entries:
      - id: CMVendorBundleSquadMedicalApparel
      - id: RMCHandsLatexMarine
        name: боевые стерильные перчатки
      - id: CMMRE
      #- id: CMMap # TODO: Make a map
    - name: Броня
      choices: { CMArmor: 1 }
      entries:
      - id: RMCArmorM3LightVariants
        name: лёгкая броня
      - id: RMCArmorM3MediumVariants
        name: средняя броня
        recommended: true
      - id: RMCArmorM3HeavyVariants
        name: тяжёлая броня
    - name: Рюкзак
      choices: { CMBackpack: 1 }
      entries:
      - id: CMBackpackMarineMedic
      - id: CMSatchelMarineMedic
        recommended: true
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: CMBeltMedicBagFilled
        name: пояс M276 медицинский (полный)
      - id: CMBeltMedicalFilled
        name: пояс M276 медицинский (полный)
    - name: Подсумки
      choices: { RMCPouch: 2 }
      entries:
      - id: RMCPouchReagentCanisterTricordrazineRevival
        name: канистра реагентов (возрождающая смесь - трикордразин)
        recommended: true
      - id: RMCPouchMedkit
        recommended: true
#     - id: CMPressurizedReagentCanisterPouchPeridaxonRevivalMix
#       name: канистра реагентов (возрождающая смесь - перидаксон)
#       recommended: true
      - id: RMCPouchAutoinjector
      - id: RMCPouchFirstResponder
      - id: RMCPouchReagentCanisterBicaridine
        name: канистра реагентов (бикаридин)
      - id: RMCPouchReagentCanisterKelotane
        name: канистра реагентов (келотан)
      - id: RMCPouchReagentCanisterTricordrazine
        name: канистра реагентов (трикордразин)
      - id: RMCPouchReagentCanister
        name: канистра реагентов (пустая)
      - id: RMCPouchVialFill
        name: подсумок пробирок (полный)
      - id: RMCPouchMedical
      - id: RMCPouchFirstAidInjectors
        name: подсумок первой помощи (многоразовые инъекторы)
      - id: RMCPouchFirstAidSplintsGauzeOintment
        name: подсумок первой помощи (марля, мазь) # TODO RMC14 splints comma
      - id: RMCPouchFirstAidPills
        name: подсумок первой помощи (таблетки)
      - id: RMCPouchFlareFilled
        name: подсумок фаеров (полный)
      - id: RMCPouchGeneralLarge
     #- id: CMSlingPouch
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchMagazine
      - id: RMCPouchShotgun
      - id: RMCPouchPistol
    - name: Аксессуары
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
        recommended: true
      - id: CMWebbingBlack
        recommended: true
      - id: CMWebbing
      - id: CMWebbingPouch
      - id: CMWebbingHolster
    - name: Маска
      choices: { CMMask: 1 }
      entries:
      - id: CMMaskSterile
      - id: CMMaskGas
      - id: CMMaskCoif
      - id: RMCMaskRebreather
