# Sniper Anti Materiel
- type: entity
  parent: BaseStorageItem
  id: RMCSniperAntiMaterielEquipmentCase
  name: sniper equipment case
  description: "A large case containing your very own long-range M96S sniper rifle, M45 ghillie armor and helmet, M42 scout sight, ammunition, spotter equipment, and additional pieces of equipment.\n\nNOTE: You cannot put items back inside this case."
  components:
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/loadout_kits.rsi
    layers:
    - state: closed
      map: [ base ]
    - state: sniper
      map: [ sniper ]
  - type: Icon
    sprite: _RMC14/Objects/loadout_kits.rsi
    state: closed
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: open }
          False: { state: closed }
        sniper:
          True: { visible: false }
          False: { visible: true }
  - type: Item
    size: Huge
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,33,1
  - type: StorageFill
    contents:
    - id: CMArmorM45
    - id: CMArmorHelmetM45
    - id: CMGlassesM42ScoutSight
    - id: CMMagazineSniperXM43E1AntiMateriel
    - id: CMMagazineSniperXM43E1AntiMateriel
    - id: CMMagazineSniperXM43E1AntiMateriel
    - id: CMMagazineSniperXM43E1AntiMateriel
    - id: CMMagazineSniperXM43E1AntiMateriel
    - id: CMMagazineSniperXM43E1AntiMateriel
    - id: CMBackpackSniper
    - id: CMWeaponPistolMK80
    - id: CMMagazinePistolMK80
    - id: CMMagazinePistolMK80
    - id: CMMagazinePistolMK80
    - id: CMXM43E1SniperRifle
#    - id: CMFacepaintSniper
    - id: CMSpotterKit
  - type: CMChangeUserOnVend
    addComponents:
    - type: SniperWhitelist
  - type: RemoveOnlyStorage
  - type: FixedItemSizeStorage

- type: entity
  parent: BaseStorageItem
  id: CMSpotterKit
  name: spotter kit
  description: It's just an ordinary box.
  components:
  - type: Sprite
    noRot: true
    sprite: _RMC14/Objects/loadout_kits.rsi
    layers:
    - state: closed
      map: [ base ]
    - state: sniper
      map: [ sniper ]
  - type: Icon
    sprite: _RMC14/Objects/loadout_kits.rsi
    state: closed
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.StorageVisuals.Open:
        base:
          True: { state: open }
          False: { state: closed }
        sniper:
          True: { visible: false }
          False: { visible: true }
  - type: Item
    size: Huge
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,11,1
  - type: StorageFill
    contents:
    - id: CMArmorM45
    - id: CMArmorHelmetM45
    - id: CMGlassesM42ScoutSight
    - id: CMBackpackSniper
    # - id: CMSpotterLaserDesignator
    - id: CMPamphletSpotter
  - type: FixedItemSizeStorage
  - type: RemoveOnlyStorage
