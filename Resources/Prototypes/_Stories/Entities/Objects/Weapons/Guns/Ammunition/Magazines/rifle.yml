# M4SPR A19 HV Flak
- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineRifleM4SPRA19Impact
  name: "M4SPR A19 magazine (impact)"
  description: "A magazine of impact A19 rounds for use in the M4SPR battle rifle."
  components:
  - type: Tag
    tags:
    - CMMagazineRifle
    - RMCMagazineRifleM4SPRA19
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeRifleM4SPRA19
    proto: RMCCartridgeRifleM4SPRA19Impact
    capacity: 18
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/m4spr.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ammo_band
      color: "#1F91DC"

