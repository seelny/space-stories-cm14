- type: entity
  abstract: true
  id: XenoBaseProjectile
  name: projectile
  components:
  - type: Clickable
  - type: Sprite
    noRot: false
    sprite: _CM14/Objects/Xeno/xeno_projectiles.rsi
  - type: Physics
    bodyType: Dynamic
    linearDamping: 0
    angularDamping: 0
  - type: Fixtures
    fixtures:
      projectile:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.1,-0.1,0.1,0.1"
        hard: false
        mask:
        - Impassable
        - BulletImpassable
  - type: Projectile
    impactEffect: XenoProjectileImpactEffect
    damage: {}
  - type: TimedDespawn
    lifetime: 0.35
  - type: XenoProjectile

- type: entity
  id: XenoSlowingSpitProjectile
  parent: XenoBaseProjectile
  name: slowing spit
  categories:
  - HideSpawnMenu
  components:
  - type: Sprite
    sprite: _CM14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: neurotoxin
  - type: XenoSlowingSpitProjectile
    armorResistsKnockdown: true
  - type: XenoProjectile
    deleteOnFriendlyXeno: true

- type: entity
  id: XenoScatteredSpitProjectile
  parent: XenoBaseProjectile
  name: scattered spit
  categories:
  - HideSpawnMenu
  components:
  - type: Sprite
    sprite: _CM14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: neurotoxin
  - type: XenoSlowingSpitProjectile
    slow: 0
    paralyze: 1
    armorResistsKnockdown: false
  - type: XenoProjectile
    deleteOnFriendlyXeno: true

- type: entity
  id: XenoSpitProjectile
  parent: XenoBaseProjectile
  name: spit
  categories:
  - HideSpawnMenu
  components:
  - type: Sprite
    sprite: _CM14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: xeno_acid
  - type: Projectile
    impactEffect: null
    damage:
      types:
        Caustic: 20
  - type: XenoProjectile
    deleteOnFriendlyXeno: true

- type: entity
  id: XenoIchorSpitProjectile
  parent: XenoBaseProjectile
  name: ichor spit
  categories:
  - HideSpawnMenu
  components:
  - type: Sprite
    sprite: _CM14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: xeno_acid
  - type: Projectile
    impactEffect: null
    damage:
      types:
        Caustic: 30
  - type: XenoProjectile
    deleteOnFriendlyXeno: true

- type: entity
  id: XenoBombardSpitProjectile
  parent: XenoBaseProjectile
  name: xeno bomb
  categories:
  - HideSpawnMenu
  components:
  - type: TriggerOnCollide
    fixtureID: projectile
  - type: SmokeOnTrigger
    duration: 20
    spreadAmount: 20
    smokePrototype: CMAcidSmoke
    solution:
      reagents:
      - ReagentId: CMAcidReagent
        Quantity: 50
  - type: SoundOnTrigger
    sound: /Audio/Effects/smoke.ogg
  - type: DeleteOnTrigger
  - type: Sprite
    sprite: _CM14/Objects/Xeno/xeno_projectiles.rsi
    layers:
    - state: boiler_railgun
  - type: TimedDespawn
    lifetime: 1
  - type: XenoProjectile
    deleteOnFriendlyXeno: false

- type: entity
  id: XenoBoneChipsProjectile
  parent: XenoBaseProjectile
  name: bone chips
  categories:
  - HideSpawnMenu
  components:
  - type: Sprite
    sprite: _CM14/Objects/Materials/shards.rsi
    layers:
    - state: bonechips
  - type: XenoSlowingSpitProjectile
    slow: 5
    paralyze: 0
  - type: TimedDespawn
    lifetime: 0.2
  - type: Projectile
    impactEffect: null
    damage:
      types:
        Slash: 10
  - type: XenoProjectile
    deleteOnFriendlyXeno: false
